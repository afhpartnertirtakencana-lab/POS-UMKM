<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>POS UMKM — Sistem Kasir &amp; Manajemen Toko</title>
<meta name="description" content="Aplikasi POS profesional untuk minimarket & UMKM: kasir, stok, pembelian, laporan, dan lainnya." />
<meta name="theme-color" content="#123B36" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="assets/icon-192.png" />
<link rel="apple-touch-icon" href="assets/icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/styles.css" />

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
<div id="root"></div>

<script src="assets/db.js"></script>
<script src="assets/ui.js"></script>
<script src="assets/sync.js"></script>
<script src="assets/app.js"></script>
<script>
  function showFatalError(err) {
    const root = document.getElementById("root");
    root.innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F6F5F1;padding:24px;font-family:sans-serif;">
        <div style="max-width:480px;background:#fff;border-radius:14px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.1);">
          <h2 style="margin:0 0 10px;color:#C4432B;">Aplikasi gagal dimuat</h2>
          <p style="font-size:14px;color:#444;line-height:1.5;">Terjadi kendala teknis saat memuat aplikasi. Coba muat ulang halaman.
          Jika file dibuka langsung dari komputer (file://), coba jalankan lewat server lokal
          (mis. <code>npx serve .</code>) atau hosting seperti Netlify/Vercel, lalu buka lagi.</p>
          <pre style="white-space:pre-wrap;font-size:11.5px;background:#f4f4f4;padding:10px;border-radius:8px;color:#c4432b;overflow:auto;">${(err && (err.stack || err.message)) || err}</pre>
          <button onclick="location.reload()" style="margin-top:12px;padding:9px 16px;border-radius:8px;border:none;background:#123B36;color:#fff;font-weight:600;cursor:pointer;">Muat Ulang</button>
        </div>
      </div>`;
  }
  window.addEventListener("error", (e) => { if (!document.getElementById("root").innerHTML) showFatalError(e.error || e.message); });
  try {
    render();
    startAutoSync();
  } catch (err) {
    console.error(err);
    showFatalError(err);
  }
  if ("serviceWorker" in navigator && location.protocol !== "file:") {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
